services:
  valheim:
    image: lloesche/valheim-server:latest
    container_name: valheim-server
    profiles: ["valheim"]
    restart: unless-stopped
    stop_grace_period: 30s
    cap_add:
      - SYS_NICE
    ports:
      - "2456-2458:2456-2458/udp"
    environment:
      - SERVER_NAME=${SERVER_NAME:-Bifrost Local}
      - SERVER_PASS=${SERVER_PASS:-localtest}
      - WORLD_NAME=${WORLD_NAME:-LocalWorld}
      - SERVER_PUBLIC=false
      - BACKUPS_CRON=*/15 * * * *
    volumes:
      - valheim-data:/config

  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft-server
    profiles: ["minecraft"]
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "25565:25565/tcp"
    environment:
      - EULA=TRUE
      - SERVER_NAME=${SERVER_NAME:-Bifrost Minecraft}
      - DIFFICULTY=${MC_DIFFICULTY:-normal}
      - GAMEMODE=${MC_GAMEMODE:-survival}
      - MEMORY=${MC_MEMORY:-2G}
      - MOTD=${MC_MOTD:-A Bifrost Minecraft Server}
    volumes:
      - minecraft-data:/data

  enshrouded:
    image: mornedhels/enshrouded-server:latest
    container_name: enshrouded-server
    profiles: ["enshrouded"]
    restart: unless-stopped
    stop_grace_period: 90s
    ports:
      - "15636-15637:15636-15637/udp"
    environment:
      - SERVER_NAME=${SERVER_NAME:-Bifrost Enshrouded}
      - SERVER_SLOT_COUNT=${ENSHROUDED_SLOTS:-16}
      - PUID=1000
      - PGID=1000
    volumes:
      - enshrouded-data:/opt/enshrouded

volumes:
  valheim-data:
  minecraft-data:
  enshrouded-data:
